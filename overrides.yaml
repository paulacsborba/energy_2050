overrides:

    spores:
        run.solver: gurobi
        run.solver_io: python
        run.cyclic_storage: true

        run.ensure_feasibility: true
        run.bigM: 1e9
        run.zero_threshold: 1e-10

        run.mode: spores
        run.spores_options.spores_number: 10
        run.spores_options.slack: 0.1
        run.spores_options.slack_cost_group: systemwide_cost_max 
        run.objective_options.cost_class: {'monetary':1}
        group_constraints.systemwide_cost_max.cost_max.monetary: .inf
        techs.ref_ethanol_1g_electricity_high.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_electricity_high.costs.spores_score.interest_rate: 1
        techs.ref_ethanol_1g_electricity_medium.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_electricity_medium.costs.spores_score.interest_rate: 1
        techs.ref_ethanol_1g_electricity_low.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_electricity_low.costs.spores_score.interest_rate: 1

        techs.ref_ethanol_1g_2g_high.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_2g_high.costs.spores_score.interest_rate: 1
        techs.ref_ethanol_1g_2g_medium.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_2g_medium.costs.spores_score.interest_rate: 1
        techs.ref_ethanol_1g_2g_low.costs.spores_score.energy_cap: 0
        techs.ref_ethanol_1g_2g_low.costs.spores_score.interest_rate: 1



