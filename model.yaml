model:

  name: 'brazil_model_biomass'
  calliope_version: 0.6.6
  timeseries_data_path: 'data'
  reserve_margin: 
       electricity: 0.15
  subset_time: ['2019-01-01', '2019-12-31']  #2050
  time: {function: resample, function_options: {'resolution': '360H'}}
   
run:
  solver: gurobi
  solver_io: python
  cyclic_storage: true
  ensure_feasibility: true
  bigM: 1e9
  zero_threshold: 1e-10
  mode: spores
  objective_options:
       cost_class: {'monetary':1}
       
       
run.spores_options:
  spores_number: 2  # The number of SPORES to generate
  slack: 0.2  # The fraction above the cost-optimal cost to set the maximum cost during SPORES
  score_cost_class: spores_score  # The cost class to optimise against when generating SPORES
  slack_cost_group: systemwide_cost_max  # The group constraint name in which the `cost_max` constraint is assigned, for use alongside the slack and cost-optimal cost
 

group_constraints:
  systemwide_cost_max.cost_max.monetary: inf
  
techs.electricity.costs.spores_score.om_prod: 1000
techs.electricity.costs.spores_score.interest_rate: 1

        
